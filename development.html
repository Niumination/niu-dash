<!DOCTYPE html>
<html lang="id">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIU-DASH // DEV TRACKER</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        :root{
            --bg:#050508;--bg2:#0a0a14;--bg3:#12121f;
            --cyan:#00fff2;--red:#ff0040;--magenta:#ff00aa;--green:#00ff88;
            --dim:#2a2a3a;--text:#c0c0d0;--text-dim:#606080;
            --glow-cyan:0 0 20px rgba(0,255,242,.15);
            --glow-red:0 0 20px rgba(255,0,64,.12);
            --rad:8px;
        }
        html{scroll-behavior:smooth}
        body{
            background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;
            min-height:100vh;overflow-x:hidden;
            background-image:
                radial-gradient(ellipse at 20% 50%, rgba(0,255,242,.03) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 50%, rgba(255,0,64,.03) 0%, transparent 50%);
        }
        body::before{
            content:'';position:fixed;inset:0;
            background:repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,255,242,.008) 2px, rgba(0,255,242,.008) 4px);
            pointer-events:none;z-index:9999;
        }

        /* NAV */
        .topbar{
            position:fixed;top:0;left:0;right:0;z-index:100;
            background:rgba(5,5,8,.85);backdrop-filter:blur(20px) saturate(1.2);
            border-bottom:1px solid rgba(255,255,255,.04);padding:0 2rem;
            display:flex;align-items:center;height:56px;
        }
        .topbar .logo{font-family:'JetBrains Mono',monospace;font-weight:800;font-size:1.1rem;color:var(--cyan);letter-spacing:-.5px}
        .topbar .logo span{color:var(--red)}
        .topbar .nav-links{margin-left:auto;display:flex;gap:.25rem}
        .topbar .nav-links a{
            color:var(--text-dim);text-decoration:none;padding:.5rem 1rem;
            font-size:.8rem;font-weight:500;border-radius:var(--rad);
            transition:all .2s;letter-spacing:.3px;
        }
        .topbar .nav-links a:hover{color:var(--text);background:rgba(255,255,255,.04)}
        .topbar .nav-links a.active{color:var(--cyan);background:rgba(0,255,242,.08)}

        .container{max-width:1400px;margin:0 auto;padding:80px 2rem 4rem}

        /* HEADER */
        .page-header{margin-bottom:3rem;padding-top:1.5rem}
        .page-header h1{
            font-family:'JetBrains Mono',monospace;font-size:2.8rem;font-weight:800;
            color:var(--cyan);letter-spacing:-2px;line-height:1.1;
            text-shadow:0 0 40px rgba(0,255,242,.12);
        }
        .page-header h1::before{content:'▶ ';color:var(--red)}
        .page-header .sub{
            color:var(--text-dim);font-size:.95rem;margin-top:.5rem;
            font-family:'JetBrains Mono',monospace;
        }
        .page-header .sub span{color:var(--cyan);background:rgba(0,255,242,.08);padding:.15rem .6rem;border-radius:4px}

        /* STAT BAR */
        .statbar{
            display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;
            margin-bottom:3rem;
        }
        .stat-card{
            background:var(--bg2);border:1px solid rgba(255,255,255,.04);
            border-radius:var(--rad);padding:1.2rem 1.5rem;
            transition:border-color .3s;
        }
        .stat-card:hover{border-color:rgba(0,255,242,.15)}
        .stat-card .num{font-family:'JetBrains Mono',monospace;font-size:1.8rem;font-weight:700}
        .stat-card .lbl{font-size:.75rem;color:var(--text-dim);margin-top:.15rem;text-transform:uppercase;letter-spacing:1px}
        .stat-card:nth-child(1) .num{color:var(--red)}
        .stat-card:nth-child(2) .num{color:var(--cyan)}
        .stat-card:nth-child(3) .num{color:var(--green)}
        .stat-card:nth-child(4) .num{color:var(--magenta)}

        /* PROJECT CARD */
        .proj-card{
            background:var(--bg2);border:1px solid rgba(255,255,255,.04);
            border-radius:12px;margin-bottom:2rem;overflow:hidden;
            transition:border-color .3s,box-shadow .3s;
        }
        .proj-card:hover{
            border-color:rgba(0,255,242,.1);
            box-shadow:0 0 30px rgba(0,255,242,.04);
        }
        .proj-card .card-header{
            padding:1.5rem 2rem;
            display:flex;align-items:center;gap:1rem;
            cursor:pointer;user-select:none;
            border-bottom:1px solid rgba(255,255,255,.03);
        }
        .proj-card .card-header:hover{background:rgba(255,255,255,.01)}
        .proj-card .card-header .icon{
            width:40px;height:40px;border-radius:var(--rad);
            display:flex;align-items:center;justify-content:center;
            font-size:1.2rem;flex-shrink:0;
            background:rgba(0,255,242,.06);color:var(--cyan);
        }
        .proj-card .card-header .info{flex:1;min-width:0}
        .proj-card .card-header .info h2{
            font-family:'JetBrains Mono',monospace;font-size:1.05rem;font-weight:600;
            color:var(--text);letter-spacing:-.3px;
        }
        .proj-card .card-header .info .tags{display:flex;gap:.4rem;flex-wrap:wrap;margin-top:.35rem}
        .proj-card .card-header .info .tags span{
            font-size:.65rem;padding:.15rem .55rem;border-radius:4px;
            background:rgba(255,255,255,.04);color:var(--text-dim);
            font-family:'JetBrains Mono',monospace;letter-spacing:.3px;
        }
        .proj-card .card-header .status{
            font-size:.7rem;padding:.35rem .9rem;border-radius:20px;
            font-weight:600;font-family:'JetBrains Mono',monospace;
            flex-shrink:0;
        }
        .status-active{background:rgba(0,255,136,.1);color:var(--green);border:1px solid rgba(0,255,136,.2)}
        .status-paused{background:rgba(255,255,0,.08);color:#ffd000;border:1px solid rgba(255,255,0,.15)}
        .status-staging{background:rgba(0,255,242,.1);color:var(--cyan);border:1px solid rgba(0,255,242,.2)}

        .proj-card .card-body{padding:0 2rem 2rem;display:none}
        .proj-card.expanded .card-body{display:block}
        .proj-card .card-body .section{margin-top:1.8rem}
        .proj-card .card-body .section:first-child{margin-top:1.5rem}
        .proj-card .card-body .section h3{
            font-family:'JetBrains Mono',monospace;font-size:.75rem;font-weight:600;
            color:var(--text-dim);text-transform:uppercase;letter-spacing:1.2px;
            margin-bottom:.75rem;display:flex;align-items:center;gap:.5rem;
        }
        .proj-card .card-body .section h3 .hl{width:20px;height:2px;border-radius:2px}
        .hl-cyan{background:var(--cyan)}
        .hl-red{background:var(--red)}
        .hl-green{background:var(--green)}
        .hl-magenta{background:var(--magenta)}

        .proj-card .card-body .section p,.proj-card .card-body .section li{
            font-size:.88rem;line-height:1.7;color:var(--text);
        }
        .proj-card .card-body .section ul{list-style:none;padding:0}
        .proj-card .card-body .section ul li{
            padding:.3rem 0 .3rem 1.2rem;position:relative;
        }
        .proj-card .card-body .section ul li::before{
            content:'›';position:absolute;left:0;color:var(--cyan);font-weight:700;
        }

        /* TIMELINE */
        .timeline{position:relative;padding-left:1.5rem}
        .timeline::before{
            content:'';position:absolute;left:6px;top:4px;bottom:4px;
            width:1px;background:linear-gradient(180deg,var(--cyan),transparent);
        }
        .tl-item{position:relative;padding:.6rem 0 .6rem 1.2rem}
        .tl-item::before{
            content:'';position:absolute;left:-1.35rem;top:.85rem;
            width:8px;height:8px;border-radius:50%;
            background:var(--bg2);border:2px solid var(--cyan);
        }
        .tl-item .tl-date{font-size:.7rem;color:var(--cyan);font-family:'JetBrains Mono',monospace;font-weight:600}
        .tl-item .tl-text{font-size:.85rem;color:var(--text-dim);margin-top:.1rem;line-height:1.5}
        .tl-item.future{opacity:.5}
        .tl-item.future::before{border-color:var(--dim)}

        /* RECOMMENDATION TAGS */
        .rec-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:.75rem}
        .rec-item{
            background:var(--bg3);border:1px solid rgba(255,255,255,.04);
            border-radius:var(--rad);padding:1rem 1.2rem;
            border-left:3px solid var(--cyan);
            font-size:.82rem;line-height:1.6;
        }
        .rec-item.prio-high{border-left-color:var(--red)}
        .rec-item.prio-mid{border-left-color:var(--magenta)}
        .rec-item .rec-prio{
            font-size:.6rem;text-transform:uppercase;letter-spacing:1px;
            font-weight:700;margin-bottom:.3rem;font-family:'JetBrains Mono',monospace;
        }
        .prio-high .rec-prio{color:var(--red)}
        .prio-mid .rec-prio{color:var(--magenta)}
        .prio-low .rec-prio{color:var(--cyan)}

        /* EXPAND ALL */
        .toolbar{
            display:flex;gap:.75rem;margin-bottom:2rem;
            flex-wrap:wrap;
        }
        .toolbar button{
            background:var(--bg2);border:1px solid rgba(255,255,255,.06);
            color:var(--text-dim);padding:.6rem 1.2rem;border-radius:var(--rad);
            font-size:.78rem;cursor:pointer;transition:all .2s;
            font-family:'JetBrains Mono',monospace;
        }
        .toolbar button:hover{
            border-color:var(--cyan);color:var(--cyan);background:rgba(0,255,242,.06);
        }

        /* EXPAND ICON */
        .expand-icon{
            font-size:1rem;color:var(--text-dim);transition:transform .3s;
            flex-shrink:0;
        }
        .proj-card.expanded .expand-icon{transform:rotate(90deg);color:var(--cyan)}

        /* RESPONSIVE */
        @media(max-width:768px){
            .container{padding:70px 1rem 2rem}
            .page-header h1{font-size:1.8rem}
            .statbar{grid-template-columns:repeat(2,1fr)}
            .proj-card .card-header{padding:1rem 1.2rem;flex-wrap:wrap}
            .proj-card .card-body{padding:0 1.2rem 1.2rem}
            .topbar{padding:0 1rem}
            .rec-grid{grid-template-columns:1fr}
        }

        /* LOADING ANIM */
        .scanline{
            position:fixed;top:0;left:0;right:0;height:2px;
            background:linear-gradient(90deg,transparent,var(--cyan),transparent);
            z-index:99999;opacity:.4;
            animation:scan 4s ease-in-out infinite;
        }
        @keyframes scan{
            0%{top:0;opacity:.3}
            50%{opacity:.6}
            100%{top:100%;opacity:.1}
        }
        /* GLITCH OVERLAY */
        .glitch-overlay{position:fixed;inset:0;pointer-events:none;z-index:9998}
        .glitch-overlay::after{
            content:'';position:absolute;inset:0;
            background:linear-gradient(0deg,transparent 48%,rgba(0,255,242,.008) 50%,transparent 52%);
            background-size:100% 4px;
            animation:glitchLine .4s linear infinite;
        }
        @keyframes glitchLine{0%{transform:translateY(0)}100%{transform:translateY(4px)}}
        @keyframes glitch{0%{transform:translate(0)}20%{transform:translate(-1px,1px)}40%{transform:translate(1px,-1px)}60%{transform:translate(-1px)}80%{transform:translate(1px,1px)}100%{transform:translate(0)}}
        .glitch-text{animation:glitch .3s infinite}
    </style>
</head>

    // ============================================================
    // RENDER
    // ============================================================
    function render(){
        const list = document.getElementById('project-list');
        let html = '';
        let active=0, staging=0, paused=0;
        DEV_PROJECTS.forEach((p,i)=>{
            if(p.status==='active') active++;
            else if(p.status==='staging') staging++;
            else if(p.status==='paused') paused++;

            const statusClass = p.status==='active'?'status-active':p.status==='staging'?'status-staging':'status-paused';
            const statusLabel = p.status==='active'?'▶ ACTIVE':p.status==='staging'?'⟐ STAGING':'◌ PAUSED';

            // Build timeline
            let tlHtml = '';
            if(p.history && p.history.length){
                tlHtml = '<div class="section"><h3><span class="hl hl-cyan"></span> HISTORY</h3><div class="timeline">';
                p.history.forEach(h=>{
                    tlHtml += `<div class="tl-item"><div class="tl-date">${h.date}</div><div class="tl-text">${h.text}</div></div>`;
                });
                tlHtml += '</div></div>';
            }

            // Build plan
            let planHtml = '';
            if(p.plan && p.plan.length){
                planHtml = '<div class="section"><h3><span class="hl hl-green"></span> PLAN / ROADMAP</h3><ul>';
                p.plan.forEach(pl=>{ planHtml += `<li>${pl}</li>`; });
                planHtml += '</ul></div>';
            }

            // Build recommendations
            let recHtml = '';
            if(p.recommendations && p.recommendations.length){
                recHtml = '<div class="section"><h3><span class="hl hl-red"></span> REKOMENDASI PERBAIKAN</h3><div class="rec-grid">';
                p.recommendations.forEach(r=>{
                    const prio = r.priority==='high'?'prio-high':r.priority==='mid'?'prio-mid':'prio-low';
                    const prioLabel = r.priority==='high'?'⚠ PRIORITAS':r.priority==='mid'?'◆ PENTING':'▸ SARAN';
                    recHtml += `<div class="rec-item ${prio}"><div class="rec-prio">${prioLabel}</div>${r.text}</div>`;
                });
                recHtml += '</div></div>';
            }

            // Link
            const link = p.repo || p.path || '#';
            const linkLabel = p.repo ? 'GitHub' : 'Lokal';

            html += `
                <div class="proj-card" data-status="${p.status}" data-index="${i}">
                    <div class="card-header" onclick="toggleCard(this)">
                        <div class="icon">${p.icon}</div>
                        <div class="info">
                            <h2>${p.name} <a href="${link}" target="_blank" style="color:var(--text-dim);font-size:.65rem;text-decoration:none;opacity:.6;font-weight:400">[${linkLabel}]</a></h2>
                            <div class="tags">${p.tags.map(t=>`<span>${t}</span>`).join('')}</div>
                        </div>
                        <div class="status ${statusClass}">${statusLabel}</div>
                        <div class="expand-icon">▶</div>
                    </div>
                    <div class="card-body">
                        ${tlHtml}
                        ${planHtml}
                        ${recHtml}
                    </div>
                </div>
            `;
        });
        list.innerHTML = html;

        document.getElementById('s-active').textContent = active;
        document.getElementById('s-staging').textContent = staging;
        document.getElementById('s-paused').textContent = paused;
        document.getElementById('s-total').textContent = DEV_PROJECTS.length;
        document.getElementById('dev-count').textContent = DEV_PROJECTS.length;
    }

    function toggleCard(header){
        const card = header.closest('.proj-card');
        card.classList.toggle('expanded');
    }

    function toggleAll(){
        document.querySelectorAll('.proj-card').forEach(c=>c.classList.add('expanded'));
    }

    function collapseAll(){
        document.querySelectorAll('.proj-card').forEach(c=>c.classList.remove('expanded'));
    }

    function filterAll(){
        document.querySelectorAll('.proj-card').forEach(c=>c.style.display='');
    }

    function filterActive(){
        document.querySelectorAll('.proj-card').forEach(c=>{
            c.style.display = c.dataset.status === 'active' ? '' : 'none';
        });
    }

    render();
</script>
