<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIU-DASH // DEV TRACKER</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600;700;800&family=Orbitron:wght@500;700;800&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        :root{
            --bg:#050508;--bg2:#0a0a14;--bg3:#12121f;
            --cyan:#00fff2;--neon-cyan:#00fff2;--red:#ff0040;
            --magenta:#b000ff;--neon-purple:#b000ff;--green:#00ff88;--neon-razer:#44d62c;
            --dim:#2a2a3a;--text:#c0c0d0;--text-dim:#606080;--border:#1a1a3a;
            --glow-cyan:0 0 8px rgba(0,255,242,.5),0 0 24px rgba(0,255,242,.2);
            --glow-purple:0 0 8px rgba(176,0,255,.55),0 0 24px rgba(176,0,255,.22);
            --glow-razer:0 0 8px rgba(68,214,44,.55),0 0 24px rgba(68,214,44,.2);
            --rad:8px;
        }
        .boot-overlay{position:fixed;inset:0;z-index:99999;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Orbitron',sans-serif;transition:opacity .8s,visibility .8s}
        .boot-overlay.hidden{opacity:0;visibility:hidden;pointer-events:none}
        .boot-overlay .boot-title{font-size:18px;font-weight:700;color:var(--cyan);letter-spacing:6px;margin-bottom:30px}
        .boot-progress-wrap{width:320px;height:3px;background:rgba(255,255,255,.05);border-radius:2px;overflow:hidden;margin-bottom:16px}
        .boot-progress-bar{height:100%;width:0;background:linear-gradient(90deg,var(--cyan),var(--magenta));transition:width .15s linear}
        .boot-status{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-dim);letter-spacing:2px;min-height:20px}
        .stagger-in{opacity:0;transform:translateY(24px);transition:opacity .6s,transform .6s cubic-bezier(.4,0,.2,1);will-change:transform,opacity}
        .stagger-in.visible{opacity:1;transform:translateY(0)}
        .stagger-in.from-top{transform:translateY(-100%)}
        .stagger-in.from-top.visible{transform:translateY(0)}
        .stagger-in[data-delay="1"]{transition-delay:.1s}
        .stagger-in[data-delay="2"]{transition-delay:.2s}
        .stagger-in[data-delay="3"]{transition-delay:.3s}
        .stagger-in[data-delay="4"]{transition-delay:.4s}
        .stagger-in[data-delay="5"]{transition-delay:.5s}
        .spring-btn{transition:transform .35s cubic-bezier(.175,.885,.32,1.275)!important;will-change:transform}
        .spring-btn:hover{transform:scale(1.05)!important}
        .spring-btn:active{transform:scale(.95)!important}
        .tilt-card{transform-style:preserve-3d;will-change:transform}
        .grid-overlay{position:fixed;inset:0;background-image:linear-gradient(rgba(0,255,242,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,242,.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:1;will-change:transform;animation:grid-scroll 8s linear infinite}
        @keyframes grid-scroll{0%{transform:translate(0,0)}100%{transform:translate(40px,40px)}}
        #particle-canvas{position:fixed;inset:0;z-index:0;opacity:.5;width:100%;height:100%}
        .neon-border-cyan{box-shadow:var(--glow-cyan);border-color:rgba(0,255,242,.35)!important}
        .charts-grid-dev{display:grid;grid-template-columns:1fr;gap:1.2rem;margin-bottom:3rem}
        @media(min-width:900px){.charts-grid-dev{grid-template-columns:1fr 1fr}}
        .chart-panel-dev{background:rgba(13,13,30,.85);border:1px solid var(--border);border-radius:12px;padding:1.2rem;height:260px;contain:content}
        .chart-panel-dev h3{font-family:'Orbitron',sans-serif;font-size:10px;letter-spacing:2px;color:var(--text-dim);margin-bottom:.8rem;text-transform:uppercase}
        .chart-panel-dev canvas{width:100%!important;height:calc(100% - 24px)!important}
        #chart-tooltip{position:fixed;pointer-events:none;opacity:0;z-index:10000;padding:12px 14px;border-radius:8px;background:rgba(5,5,8,.82);backdrop-filter:blur(12px);border:1px solid rgba(0,255,242,.45);font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text)}
        #chart-tooltip .tt-title{font-family:'Orbitron',sans-serif;color:var(--cyan);margin-bottom:6px;font-size:10px}
        @media(prefers-reduced-motion:reduce){
            .grid-overlay,.scanline{animation:none}
            .stagger-in,.stagger-in.from-top{transition:none;opacity:1;transform:none}
            #particle-canvas{display:none}
        }
        html{scroll-behavior:smooth}
        body{
            background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;
            min-height:100vh;overflow-x:hidden;
            background-image:
                radial-gradient(ellipse at 20% 50%, rgba(0,255,242,.03) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 50%, rgba(255,0,64,.03) 0%, transparent 50%);
        }
        body::before{
            content:'';position:fixed;inset:0;
            background:repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,255,242,.008) 2px, rgba(0,255,242,.008) 4px);
            pointer-events:none;z-index:9999;
        }

        /* NAV */
        .topbar{
            position:fixed;top:0;left:0;right:0;z-index:100;
            background:rgba(5,5,8,.85);backdrop-filter:blur(20px) saturate(1.2);
            border-bottom:1px solid rgba(255,255,255,.04);padding:0 2rem;
            display:flex;align-items:center;height:56px;
        }
        .topbar .logo{font-family:'Orbitron',sans-serif;font-weight:800;font-size:1.1rem;color:var(--cyan);letter-spacing:-.5px}
        .topbar .logo span{color:var(--red)}
        .topbar .nav-links{margin-left:auto;display:flex;gap:.25rem}
        .topbar .nav-links a{
            color:var(--text-dim);text-decoration:none;padding:.6rem 1.2rem;
            font-size:.85rem;font-weight:600;border-radius:var(--rad);
            transition:all .2s;letter-spacing:.5px;
        }
        .topbar .nav-links a:hover{color:var(--text);background:rgba(255,255,255,.06);filter:brightness(1.2)}
        .topbar .nav-links a.active{color:var(--cyan);background:rgba(0,255,242,.1);border:1px solid rgba(0,255,242,.15)}

        .container{max-width:1400px;margin:0 auto;padding:80px 2rem 4rem;position:relative;z-index:2}

        /* HEADER */
        .page-header{margin-bottom:3rem;padding-top:1.5rem}
        .page-header h1{
            font-family:'Orbitron',sans-serif;font-size:2.8rem;font-weight:800;
            color:var(--cyan);letter-spacing:-2px;line-height:1.1;
            text-shadow:0 0 40px rgba(0,255,242,.12);
            filter:drop-shadow(0 0 6px rgba(0,255,242,.5));
        }
        .page-header h1::before{content:'▶ ';color:var(--red)}
        .page-header .sub{
            color:var(--text-dim);font-size:.95rem;margin-top:.5rem;
            font-family:'JetBrains Mono',monospace;
        }
        .page-header .sub span{color:var(--cyan);background:rgba(0,255,242,.08);padding:.15rem .6rem;border-radius:4px}

        /* STAT BAR */
        .statbar{
            display:grid;grid-template-columns:repeat(4,1fr);gap:1.2rem;
            margin-bottom:3.5rem;
        }
        .stat-card{
            background:rgba(13,13,30,0.8);border:1px solid rgba(255,255,255,.05);
            border-radius:12px;padding:1.5rem 1.8rem;
            transition:border-color .3s,box-shadow .3s;
            will-change:transform;
        }
        .stat-card:hover{border-color:rgba(0,255,242,.15);box-shadow:var(--glow-cyan)}
        .stat-card .num{font-family:'Orbitron',sans-serif;font-size:2.2rem;font-weight:800}
        .stat-card .lbl{font-family:'Rajdhani',sans-serif;font-size:.8rem;color:#7070a0;margin-top:.2rem;text-transform:uppercase;letter-spacing:1.2px;font-weight:600}
        .stat-card:nth-child(1) .num{color:var(--red)}
        .stat-card:nth-child(2) .num{color:var(--cyan)}
        .stat-card:nth-child(3) .num{color:var(--green)}
        .stat-card:nth-child(4) .num{color:var(--magenta)}
 

        /* PROJECT CARD */
        .proj-card{
            background:rgba(13,13,28,0.85);border:1px solid rgba(255,255,255,.05);
            border-radius:14px;margin-bottom:2.2rem;overflow:hidden;
            transition:border-color .3s,box-shadow .3s;
        }
        .proj-card:hover{
            border-color:rgba(0,255,242,.12);
            box-shadow:0 0 35px rgba(0,255,242,.05);
        }
        .proj-card .card-header{
            padding:1.8rem 2.2rem;
            display:flex;align-items:center;gap:1.2rem;
            cursor:pointer;user-select:none;
            border-bottom:1px solid rgba(255,255,255,.03);
        }
        .proj-card .card-header:hover{background:rgba(255,255,255,.015)}
        .proj-card .card-header .icon{
            width:46px;height:46px;border-radius:12px;
            display:flex;align-items:center;justify-content:center;
            font-size:1.4rem;flex-shrink:0;
            background:rgba(0,255,242,.08);color:var(--cyan);
        }
        .proj-card .card-header .info{flex:1;min-width:0}
        .proj-card .card-header .info h2{
            font-family:'JetBrains Mono',monospace;font-size:1.15rem;font-weight:600;
            color:#ececf5;letter-spacing:-.3px;
        }
        .proj-card .card-header .info .tags{display:flex;gap:.5rem;flex-wrap:wrap;margin-top:.4rem}
        .proj-card .card-header .info .tags span{
            font-size:.7rem;padding:.2rem .7rem;border-radius:5px;
            background:rgba(255,255,255,.05);color:#8888aa;
            font-family:'JetBrains Mono',monospace;letter-spacing:.4px;
        }
        .proj-card .card-header .status{
            font-size:.75rem;padding:.4rem 1rem;border-radius:20px;
            font-weight:700;font-family:'JetBrains Mono',monospace;
            flex-shrink:0;
        }
        .status-active{background:rgba(0,255,136,.12);color:#00ff88;border:1px solid rgba(0,255,136,.25)}
        .status-paused{background:rgba(255,255,0,.08);color:#ffd000;border:1px solid rgba(255,255,0,.15)}
        .status-staging{background:rgba(0,255,242,.12);color:var(--cyan);border:1px solid rgba(0,255,242,.2)}

        .proj-card .card-body{padding:0 2.2rem 2.2rem;display:none}
        .proj-card.expanded .card-body{display:block}
        .proj-card .card-body .section{margin-top:2rem}
        .proj-card .card-body .section:first-child{margin-top:1.8rem}
        .proj-card .card-body .section h3{
            font-family:'Rajdhani',sans-serif;font-size:.85rem;font-weight:700;
            color:#6060a0;text-transform:uppercase;letter-spacing:1.5px;
            margin-bottom:.9rem;display:flex;align-items:center;gap:.6rem;
        }
        .proj-card .card-body .section h3 .hl{width:20px;height:2px;border-radius:2px}
        .hl-cyan{background:var(--cyan)}
        .hl-red{background:var(--red)}
        .hl-green{background:var(--green)}
        .hl-magenta{background:var(--magenta)}

        .proj-card .card-body .section p,.proj-card .card-body .section li{
            font-size:.92rem;line-height:1.75;color:#c8c8da;
        }
        .proj-card .card-body .section ul{list-style:none;padding:0}
        .proj-card .card-body .section ul li{
            padding:.4rem 0 .4rem 1.4rem;position:relative;
        }
        .proj-card .card-body .section ul li::before{
            content:'›';position:absolute;left:0;color:var(--cyan);font-weight:700;font-size:1.1rem;
        }

        /* TIMELINE */
        .timeline{position:relative;padding-left:1.8rem}
        .timeline::before{
            content:'';position:absolute;left:7px;top:4px;bottom:4px;
            width:1.5px;background:linear-gradient(180deg,var(--cyan),transparent);
        }
        .tl-item{position:relative;padding:.8rem 0 .8rem 1.4rem}
        .tl-item::before{
            content:'';position:absolute;left:-1.45rem;top:.9rem;
            width:10px;height:10px;border-radius:50%;
            background:var(--bg2);border:2px solid var(--cyan);
        }
        .tl-item .tl-date{font-size:.75rem;color:var(--cyan);font-family:'JetBrains Mono',monospace;font-weight:700}
        .tl-item .tl-text{font-size:.9rem;color:#9999b5;margin-top:.15rem;line-height:1.6}
        .tl-item.future{opacity:.5}
        .tl-item.future::before{border-color:var(--dim)}

        /* RECOMMENDATION TAGS */
        .rec-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:.9rem}
        .rec-item{
            background:rgba(18,18,35,0.8);border:1px solid rgba(255,255,255,.04);
            border-radius:var(--rad);padding:1.2rem 1.4rem;
            border-left:3px solid var(--cyan);
            font-size:.85rem;line-height:1.65;color:#c0c0d5;
        }
        .rec-item.prio-high{border-left-color:var(--red)}
        .rec-item.prio-mid{border-left-color:var(--magenta)}
        .rec-item .rec-prio{
            font-size:.65rem;text-transform:uppercase;letter-spacing:1.2px;
            font-weight:700;margin-bottom:.35rem;font-family:'JetBrains Mono',monospace;
        }
        .prio-high .rec-prio{color:var(--red)}
        .prio-mid .rec-prio{color:var(--magenta)}
        .prio-low .rec-prio{color:var(--cyan)}

        /* EXPAND ALL */
        .toolbar{
            display:flex;gap:1rem;margin-bottom:2.5rem;
            flex-wrap:wrap;
        }
        .toolbar button{
            background:rgba(13,13,28,0.85);border:1px solid rgba(255,255,255,.07);
            color:#8888aa;padding:.7rem 1.4rem;border-radius:var(--rad);
            font-size:.82rem;cursor:pointer;transition:border-color .2s,color .2s,background .2s,transform .35s cubic-bezier(.175,.885,.32,1.275);
            font-family:'JetBrains Mono',monospace;font-weight:600;
        }
        .toolbar button:hover{
            border-color:var(--cyan);color:var(--cyan);background:rgba(0,255,242,.08);
        }

        /* EXPAND ICON */
        .expand-icon{
            font-size:1rem;color:var(--text-dim);transition:transform .3s;
            flex-shrink:0;
        }
        .proj-card.expanded .expand-icon{transform:rotate(90deg);color:var(--cyan)}

        /* RESPONSIVE */
        @media(max-width:768px){
            .container{padding:70px 1rem 2rem}
            .page-header h1{font-size:1.8rem}
            .statbar{grid-template-columns:repeat(2,1fr)}
            .proj-card .card-header{padding:1rem 1.2rem;flex-wrap:wrap}
            .proj-card .card-body{padding:0 1.2rem 1.2rem}
            .topbar{padding:0 1rem}
            .rec-grid{grid-template-columns:1fr}
        }

        /* LOADING ANIM */
        .scanline{
            position:fixed;top:0;left:0;right:0;height:2px;
            background:linear-gradient(90deg,transparent,var(--cyan),transparent);
            z-index:99999;opacity:.4;
            animation:scan 4s ease-in-out infinite;
        }
        @keyframes scan{
            0%{top:0;opacity:.3}
            50%{opacity:.6}
            100%{top:100%;opacity:.1}
        }
        /* GLITCH OVERLAY */
        .glitch-overlay{position:fixed;inset:0;pointer-events:none;z-index:9998}
        .glitch-overlay::after{
            content:'';position:absolute;inset:0;
            background:linear-gradient(0deg,transparent 48%,rgba(0,255,242,.008) 50%,transparent 52%);
            background-size:100% 4px;
            animation:glitchLine .4s linear infinite;
        }
        @keyframes glitchLine{0%{transform:translateY(0)}100%{transform:translateY(4px)}}
        @keyframes glitch{0%{transform:translate(0)}20%{transform:translate(-1px,1px)}40%{transform:translate(1px,-1px)}60%{transform:translate(-1px)}80%{transform:translate(1px,1px)}100%{transform:translate(0)}}
        .glitch-text{animation:glitch .3s infinite}
    </style>
</head>
<body>
<div class="boot-overlay" id="boot-overlay">
    <div class="boot-title">⟐ LOADING DEV DATABASE ⟐</div>
    <div class="boot-progress-wrap"><div class="boot-progress-bar" id="boot-bar"></div></div>
    <div class="boot-status" id="boot-status">initializing...</div>
</div>
<div class="scanline"></div>
<div class="glitch-overlay"></div>
<canvas id="particle-canvas"></canvas>
<div class="grid-overlay"></div>

<!-- TOPBAR -->
<div class="topbar stagger-in from-top" data-delay="1">
    <div class="logo">NIU<span>//</span>DEV</div>
    <div class="nav-links">
        <a href="index.html">⟐ DASHBOARD</a>
        <a href="#" class="active">▶ DEV TRACKER</a>
    </div>
</div>

<div class="container">
    <!-- HEADER -->
    <div class="page-header stagger-in" data-delay="2">
        <h1>DEV TRACKER</h1>
        <div class="sub">Prioritas · History · Plan · Rekomendasi — <span id="dev-count">25</span> project dalam pengembangan</div>
    </div>

    <!-- STAT BAR -->
    <div class="statbar stagger-in" data-delay="3">
        <div class="stat-card tilt-card neon-border-cyan"><div class="num count-up" id="s-active" data-target="0">0</div><div class="lbl">Aktif</div></div>
        <div class="stat-card tilt-card neon-border-cyan"><div class="num count-up" id="s-staging" data-target="0">0</div><div class="lbl">Staging</div></div>
        <div class="stat-card tilt-card"><div class="num count-up" id="s-paused" data-target="0">0</div><div class="lbl">Paused</div></div>
        <div class="stat-card tilt-card neon-border-purple"><div class="num count-up" id="s-total" data-target="0">0</div><div class="lbl">Total Dev</div></div>
    </div>

    <!-- DEV CHARTS -->
    <section class="charts-grid-dev stagger-in" data-delay="4">
        <div class="chart-panel-dev neon-border-cyan">
            <h3>Status Proyek</h3>
            <canvas id="chart-dev-status"></canvas>
        </div>
        <div class="chart-panel-dev neon-border-purple">
            <h3>Rekomendasi per Prioritas</h3>
            <canvas id="chart-dev-priority"></canvas>
        </div>
    </section>

    <!-- TOOLBAR -->
    <div class="toolbar stagger-in" data-delay="5">
        <button onclick="toggleAll()">[ ⋮ ] Expand All</button>
        <button onclick="collapseAll()">[ △ ] Collapse All</button>
        <button onclick="filterActive()">[ ▶ ] Active Only</button>
        <button onclick="filterAll()">[ ⊞ ] Show All</button>
    </div>

    <!-- PROJECTS -->
    <div id="project-list" class="stagger-in" data-delay="6"></div>
</div>

<div id="chart-tooltip"></div>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>

    function render(){
        const list = document.getElementById('project-list');
        let html = '';
        let active=0, staging=0, paused=0;
        DEV_PROJECTS.forEach((p,i)=>{
            if(p.status==='active') active++;
            else if(p.status==='staging') staging++;
            else if(p.status==='paused') paused++;

            const statusClass = p.status==='active'?'status-active':p.status==='staging'?'status-staging':'status-paused';
            const statusLabel = p.status==='active'?'▶ ACTIVE':p.status==='staging'?'⟐ STAGING':'◌ PAUSED';

            // Build timeline
            let tlHtml = '';
            if(p.history && p.history.length){
                tlHtml = '<div class="section"><h3><span class="hl hl-cyan"></span> HISTORY</h3><div class="timeline">';
                p.history.forEach(h=>{
                    tlHtml += `<div class="tl-item"><div class="tl-date">${h.date}</div><div class="tl-text">${h.text}</div></div>`;
                });
                tlHtml += '</div></div>';
            }

            // Build plan
            let planHtml = '';
            if(p.plan && p.plan.length){
                planHtml = '<div class="section"><h3><span class="hl hl-green"></span> PLAN / ROADMAP</h3><ul>';
                p.plan.forEach(pl=>{ planHtml += `<li>${pl}</li>`; });
                planHtml += '</ul></div>';
            }

            // Build recommendations
            let recHtml = '';
            if(p.recommendations && p.recommendations.length){
                recHtml = '<div class="section"><h3><span class="hl hl-red"></span> REKOMENDASI PERBAIKAN</h3><div class="rec-grid">';
                p.recommendations.forEach(r=>{
                    const prio = r.priority==='high'?'prio-high':r.priority==='mid'?'prio-mid':'prio-low';
                    const prioLabel = r.priority==='high'?'⚠ PRIORITAS':r.priority==='mid'?'◆ PENTING':'▸ SARAN';
                    recHtml += `<div class="rec-item ${prio}"><div class="rec-prio">${prioLabel}</div>${r.text}</div>`;
                });
                recHtml += '</div></div>';
            }

            // Link
            const link = p.repo || p.path || '#';
            const linkLabel = p.repo ? 'GitHub' : 'Lokal';

            html += `
                <div class="proj-card stagger-in tilt-card" data-status="${p.status}" data-index="${i}" style="transition-delay:${(i * 0.04)}s">
                    <div class="card-header" onclick="toggleCard(this)">
                        <div class="icon">${p.icon}</div>
                        <div class="info">
                            <h2>${p.name} <a href="${link}" target="_blank" style="color:var(--text-dim);font-size:.65rem;text-decoration:none;opacity:.6;font-weight:400">[${linkLabel}]</a></h2>
                            <div class="tags">${p.tags.map(t=>`<span>${t}</span>`).join('')}</div>
                        </div>
                        <div class="status ${statusClass}">${statusLabel}</div>
                        <div class="expand-icon">▶</div>
                    </div>
                    <div class="card-body">
                        ${tlHtml}
                        ${planHtml}
                        ${recHtml}
                    </div>
                </div>
            `;
        });
        list.innerHTML = html;

        const stats = { active, staging, paused, total: DEV_PROJECTS.length };
        ['s-active','s-staging','s-paused','s-total'].forEach((id, i) => {
            const el = document.getElementById(id);
            const val = [active, staging, paused, DEV_PROJECTS.length][i];
            el.dataset.target = val;
            el.textContent = '0';
        });
        document.getElementById('dev-count').textContent = DEV_PROJECTS.length;
        return stats;
    }

    function aggregatePriorities() {
        const counts = { high: 0, mid: 0, low: 0 };
        DEV_PROJECTS.forEach(p => {
            (p.recommendations || []).forEach(r => {
                if (counts[r.priority] !== undefined) counts[r.priority]++;
            });
        });
        return counts;
    }

    function toggleCard(header){
        const card = header.closest('.proj-card');
        card.classList.toggle('expanded');
    }

    function toggleAll(){
        document.querySelectorAll('.proj-card').forEach(c=>c.classList.add('expanded'));
    }

    function collapseAll(){
        document.querySelectorAll('.proj-card').forEach(c=>c.classList.remove('expanded'));
    }

    function filterAll(){
        document.querySelectorAll('.proj-card').forEach(c=>c.style.display='');
    }

    function filterActive(){
        document.querySelectorAll('.proj-card').forEach(c=>{
            c.style.display = c.dataset.status === 'active' ? '' : 'none';
        });
    }

    const prefersReducedMotion = () => window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    const Sfx = {
        ctx: null, lastHover: 0, muted: false,
        init() { if (!this.muted && !this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); },
        click() {
            if (this.muted) return;
            try {
                this.init();
                const o = this.ctx.createOscillator(), g = this.ctx.createGain();
                o.connect(g); g.connect(this.ctx.destination);
                o.frequency.value = 800; o.type = 'square';
                g.gain.setValueAtTime(0.04, this.ctx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.06);
                o.start(this.ctx.currentTime); o.stop(this.ctx.currentTime + 0.06);
            } catch (_) {}
        },
        hover() {
            if (this.muted) return;
            const n = Date.now();
            if (n - this.lastHover < 80) return;
            this.lastHover = n;
            try {
                this.init();
                const o = this.ctx.createOscillator(), g = this.ctx.createGain();
                o.connect(g); g.connect(this.ctx.destination);
                o.frequency.value = 1200; o.type = 'sine';
                g.gain.setValueAtTime(0.015, this.ctx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.04);
                o.start(this.ctx.currentTime); o.stop(this.ctx.currentTime + 0.04);
            } catch (_) {}
        }
    };

    function animateCount(el, target, duration = 1200) {
        const start = performance.now();
        function tick(now) {
            const t = Math.min((now - start) / duration, 1);
            const eased = 1 - Math.pow(1 - t, 3);
            el.textContent = Math.floor(eased * target);
            if (t < 1) requestAnimationFrame(tick);
        }
        requestAnimationFrame(tick);
    }

    function startCountUp() {
        document.querySelectorAll('.count-up').forEach(el => {
            animateCount(el, parseInt(el.dataset.target, 10) || 0);
        });
    }

    function initParticles() {
        if (prefersReducedMotion()) return;
        const canvas = document.getElementById('particle-canvas');
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        let w, h, particles = [];
        const COUNT = window.matchMedia('(max-width:768px)').matches ? 35 : 50;
        function resize() { w = canvas.width = innerWidth; h = canvas.height = innerHeight; }
        window.addEventListener('resize', resize);
        resize();
        for (let i = 0; i < COUNT; i++) {
            particles.push({
                x: Math.random() * w, y: Math.random() * h,
                vx: (Math.random() - 0.5) * 0.4, vy: (Math.random() - 0.5) * 0.4,
                r: Math.random() * 1.5 + 0.5, a: Math.random() * 0.4 + 0.2
            });
        }
        function loop() {
            if (!document.hidden) {
                ctx.clearRect(0, 0, w, h);
                particles.forEach(p => {
                    p.x += p.vx; p.y += p.vy;
                    if (p.x < 0 || p.x > w) p.vx *= -1;
                    if (p.y < 0 || p.y > h) p.vy *= -1;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(0,255,242,${p.a * 0.5})`;
                    ctx.fill();
                });
            }
            requestAnimationFrame(loop);
        }
        loop();
    }

    function setupTiltCards() {
        if (prefersReducedMotion()) return;
        document.querySelectorAll('.tilt-card').forEach(card => {
            card.addEventListener('mousemove', e => {
                const r = card.getBoundingClientRect();
                const rx = ((e.clientY - r.top - r.height / 2) / (r.height / 2)) * -6;
                const ry = ((e.clientX - r.left - r.width / 2) / (r.width / 2)) * 6;
                card.style.transform = `perspective(700px) rotateX(${rx}deg) rotateY(${ry}deg)`;
            });
            card.addEventListener('mouseleave', () => {
                card.style.transform = 'perspective(700px) rotateX(0) rotateY(0)';
            });
        });
    }

    function externalTooltipHandler(context) {
        const el = document.getElementById('chart-tooltip');
        const m = context.tooltip;
        if (m.opacity === 0) { el.style.opacity = '0'; return; }
        const title = m.title || [];
        const body = m.body ? m.body.map(b => b.lines).flat() : [];
        el.innerHTML = '<div class="tt-title">' + title.join(' ') + '</div>' + body.join('<br>');
        const { offsetLeft: x, offsetTop: y } = context.chart.canvas;
        el.style.opacity = '1';
        el.style.left = (x + m.caretX) + 'px';
        el.style.top = (y + m.caretY) + 'px';
    }

    const chartTooltipOpts = { enabled: false, external: externalTooltipHandler };

    function initDevCharts(stats) {
        const statusCtx = document.getElementById('chart-dev-status');
        const prioCtx = document.getElementById('chart-dev-priority');
        if (!statusCtx || !prioCtx || typeof Chart === 'undefined') return;
        const dur = prefersReducedMotion() ? 0 : 1500;
        const prio = aggregatePriorities();
        const scale = { grid: { color: 'rgba(255,255,255,.05)' }, ticks: { color: '#8888aa', font: { family: 'Rajdhani', size: 11 } } };
        let started = false;
        function create() {
            if (started) return;
            started = true;
            new Chart(statusCtx, {
                type: 'doughnut',
                data: {
                    labels: ['Active', 'Staging', 'Paused'],
                    datasets: [{
                        data: [stats.active, stats.staging, stats.paused],
                        backgroundColor: ['rgba(0,255,136,.55)', 'rgba(0,255,242,.5)', 'rgba(255,208,0,.45)'],
                        borderColor: ['#44d62c', '#00fff2', '#ffd000'],
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    animation: { duration: dur, easing: 'easeOutQuart' },
                    plugins: { legend: { position: 'bottom', labels: { color: '#8888aa', font: { family: 'JetBrains Mono', size: 10 } } }, tooltip: chartTooltipOpts }
                }
            });
            new Chart(prioCtx, {
                type: 'bar',
                data: {
                    labels: ['High', 'Mid', 'Low'],
                    datasets: [{
                        data: [prio.high, prio.mid, prio.low],
                        backgroundColor: ['rgba(255,0,64,.5)', 'rgba(176,0,255,.5)', 'rgba(0,255,242,.45)'],
                        borderColor: ['#ff0040', '#b000ff', '#00fff2'],
                        borderWidth: 1, borderRadius: 6
                    }]
                },
                options: {
                    indexAxis: 'y', responsive: true, maintainAspectRatio: false,
                    animation: { duration: dur, easing: 'easeOutQuart' },
                    plugins: { legend: { display: false }, tooltip: chartTooltipOpts },
                    scales: { x: { beginAtZero: true, ...scale }, y: scale }
                }
            });
        }
        const section = document.querySelector('.charts-grid-dev');
        if (!section) return;
        if (prefersReducedMotion()) { create(); return; }
        const obs = new IntersectionObserver(es => {
            if (es.some(e => e.isIntersecting)) { create(); obs.disconnect(); }
        }, { threshold: 0.25 });
        obs.observe(section);
    }

    function revealStaggered() {
        document.querySelectorAll('.stagger-in').forEach(el => el.classList.add('visible'));
        setTimeout(startCountUp, 300);
    }

    function runBoot() {
        const overlay = document.getElementById('boot-overlay');
        const bar = document.getElementById('boot-bar');
        const status = document.getElementById('boot-status');
        if (prefersReducedMotion()) {
            overlay.classList.add('hidden');
            revealStaggered();
            return;
        }
        const msgs = [['sync repos...',15],['load dev index...',35],['parse timelines...',55],['rank priorities...',75],['HUD ready.',100]];
        let step = 0;
        const iv = setInterval(() => {
            if (step < msgs.length) {
                const [m, p] = msgs[step];
                bar.style.width = p + '%';
                status.textContent = '[' + String(p).padStart(3) + '%] ' + m;
                step++;
            } else {
                clearInterval(iv);
                setTimeout(() => { overlay.classList.add('hidden'); revealStaggered(); }, 400);
            }
        }, 200);
    }

    function bindSfx() {
        document.querySelectorAll('button, .topbar .nav-links a, .chart-panel-dev').forEach(el => {
            el.addEventListener('click', () => Sfx.click());
            el.addEventListener('mouseenter', () => Sfx.hover());
        });
        document.querySelectorAll('.toolbar button').forEach(el => el.classList.add('spring-btn'));
        document.querySelectorAll('.topbar .nav-links a').forEach(el => el.classList.add('spring-btn'));
        document.addEventListener('click', () => Sfx.init(), { once: true });
    }

    let lastStats = null;
    window.addEventListener('DOMContentLoaded', () => {
        if (prefersReducedMotion()) Sfx.muted = true;
        lastStats = render();
        setupTiltCards();
        initParticles();
        initDevCharts(lastStats);
        bindSfx();
        runBoot();
    });
</script>

</body>
</html>
