<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏁 Released · NIU⚡DASH</title>
    <meta name="description" content="Released Projects — Completed & Production Ready dari Niumination.">
    <meta name="theme-color" content="#050508">
    <link rel="icon" type="image/svg+xml" href="icon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@300;400;500;600;700&family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
        html{scroll-behavior:smooth;background:#050508;font-size:110%}
        :root{
            --bg-primary:#050508;--bg-secondary:#0a0a14;--bg-card:#0d0d1a;
            --bg-card-hover:#12122a;--border:#1a1a3a;--border-subtle:rgba(255,255,255,.04);
            --cyan:#00fff2;--cyan-dim:rgba(0,255,242,.3);--red:#ff0040;--red-dim:rgba(255,0,64,.3);
            --magenta:#b000ff;--magenta-dim:rgba(176,0,255,.3);--green:#00ff88;
            --neon-purple:#b000ff;--amber:#ffaa00;--glitch-blue:#0066ff;
            --text-primary:#e8e8f0;--text-secondary:#8888aa;--text-muted:#55557a;
            --sidebar-w:260px;--detail-w:380px;
            --glow-cyan:0 0 7px rgba(0,255,242,.6),0 0 20px rgba(0,255,242,.3);
            --glow-red:0 0 7px rgba(255,0,64,.6),0 0 20px rgba(255,0,64,.3);
            --glow-box-cyan:0 0 10px rgba(0,255,242,.15),0 0 30px rgba(0,255,242,.05);
            --rad:8px;
        }
        body{font-family:'Inter',sans-serif;color:var(--text-primary);background:var(--bg-primary);overflow-x:hidden;min-height:100vh}

        /* ===== BOOT OVERLAY ===== */
        .boot-overlay{position:fixed;inset:0;z-index:99999;background:var(--bg-primary);display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Orbitron',sans-serif;transition:opacity .8s,visibility .8s}
        .boot-overlay.hidden{opacity:0;visibility:hidden;pointer-events:none}
        .boot-title{display:flex;flex-direction:column;align-items:center;gap:4px;margin-bottom:24px}
        .boot-title .bt-line1{font-size:32px;font-weight:900;color:var(--cyan);letter-spacing:2px;text-shadow:0 0 30px rgba(0,255,242,.3),0 0 60px rgba(0,255,242,.1);position:relative}
        .boot-title .bt-line1 .bt-bolt{color:var(--amber);text-shadow:0 0 20px rgba(255,170,0,.4)}
        .boot-title .bt-line1 .bt-dash{color:var(--text-primary);letter-spacing:6px;font-weight:300}
        .boot-title .bt-underline{width:280px;height:1px;background:linear-gradient(90deg,transparent,var(--cyan),var(--magenta),transparent);margin:6px 0}
        .boot-title .bt-sub{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text-muted);letter-spacing:6px;text-transform:uppercase;font-weight:400}
        .boot-title .bt-glitch{position:absolute;top:0;left:0;font-size:32px;font-weight:900;color:var(--red);opacity:0;pointer-events:none}
        .boot-title:hover .bt-glitch{opacity:.15;animation:glitchBoot .4s infinite}
        @keyframes glitchBoot{0%{transform:translate(0)}20%{transform:translate(-2px,1px)}40%{transform:translate(2px,-1px)}60%{transform:translate(-1px,-2px)}80%{transform:translate(1px,2px)}100%{transform:translate(0)}}
        .boot-progress-wrap{width:320px;height:3px;background:rgba(255,255,255,.05);border-radius:2px;overflow:hidden;margin-bottom:16px}
        .boot-progress-bar{height:100%;width:0;background:linear-gradient(90deg,var(--cyan),var(--magenta));transition:width .15s linear;will-change:width}
        .boot-status{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-muted);letter-spacing:2px;min-height:20px}

        /* ===== GRID & GLITCH OVERLAY ===== */
        .grid-overlay{position:fixed;inset:0;background-image:linear-gradient(rgba(0,255,242,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,242,.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;animation:grid-scroll 8s linear infinite}
        @keyframes grid-scroll{0%{transform:translate(0,0)}100%{transform:translate(40px,40px)}}
        .glitch-overlay{position:fixed;inset:0;pointer-events:none;z-index:9998;background:linear-gradient(90deg,rgba(255,0,64,.02) 0%,transparent 2%,transparent 98%,rgba(0,255,242,.02) 100%);animation:glitch-flicker 4s infinite}
        @keyframes glitch-flicker{0%,95%,100%{opacity:0}96%{opacity:1}97%{opacity:0}}
        body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,255,242,.008) 2px,rgba(0,255,242,.008) 4px);pointer-events:none;z-index:9999}
        #particle-canvas{position:fixed;inset:0;z-index:0;opacity:.5;width:100%;height:100%;pointer-events:none}

        /* ===== TOAST ===== */
        .toast-container{position:fixed;bottom:20px;right:20px;z-index:99999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
        .toast{font-family:'JetBrains Mono',monospace;font-size:11px;padding:10px 16px;border-radius:6px;border:1px solid;pointer-events:auto;animation:toast-in .3s ease;max-width:360px;line-height:1.5;backdrop-filter:blur(8px)}
        .toast.toast-hide{animation:toast-out .3s ease forwards}
        .toast.toast-error{background:rgba(255,0,64,.15);color:#ff4466;border-color:rgba(255,0,64,.3)}
        .toast.toast-warn{background:rgba(255,170,0,.12);color:#ffbb33;border-color:rgba(255,170,0,.25)}
        .toast.toast-success{background:rgba(0,255,136,.1);color:#00ff88;border-color:rgba(0,255,136,.2)}
        .toast.toast-info{background:rgba(0,255,242,.1);color:#00fff2;border-color:rgba(0,255,242,.2)}
        @keyframes toast-in{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
        @keyframes toast-out{from{opacity:1;transform:translateY(0)}to{opacity:0;transform:translateY(20px)}}

        /* ===== MAIN CONTENT ===== */
        .app-wrap{position:relative;z-index:1;max-width:900px;margin:0 auto;padding:32px 24px 80px}
        .back-link{display:inline-flex;align-items:center;gap:6px;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-muted);text-decoration:none;margin-bottom:24px;transition:color .2s;letter-spacing:.5px}
        .back-link:hover{color:var(--cyan)}

        /* ===== HERO ===== */
        .hero{text-align:center;margin-bottom:32px}
        .hero .hero-icon{font-size:48px;margin-bottom:8px}
        .hero h1{font-family:'Orbitron',sans-serif;font-size:28px;font-weight:900;color:var(--cyan);letter-spacing:1px;text-shadow:0 0 30px rgba(0,255,242,.2)}
        .hero .hero-sub{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-muted);letter-spacing:2px;margin-top:4px}
        .hero .hero-stats{display:flex;justify-content:center;gap:32px;margin-top:20px;flex-wrap:wrap}
        .hero .hero-stats .hs-item{text-align:center}
        .hero .hero-stats .hs-item .hs-num{font-family:'Orbitron',sans-serif;font-size:28px;font-weight:900;display:block}
        .hero .hero-stats .hs-item .hs-num.prod-num{color:var(--green);text-shadow:0 0 15px rgba(0,255,136,.2)}
        .hero .hero-stats .hs-item .hs-num.comp-num{color:var(--cyan);text-shadow:0 0 15px rgba(0,255,242,.2)}
        .hero .hero-stats .hs-item .hs-num.total-num{color:var(--text-secondary)}
        .hero .hero-stats .hs-item .hs-lbl{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin-top:2px}
        .hero .hero-last-sync{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text-muted);margin-top:12px;letter-spacing:1px}
        .hero .hero-last-sync .sync-dot{display:inline-block;width:5px;height:5px;border-radius:50%;margin-right:4px;vertical-align:middle;animation:cw-pulse 1.2s ease-in-out infinite}
        @keyframes cw-pulse{0%,100%{opacity:.3;transform:scale(1)}50%{opacity:.9;transform:scale(1.3)}}

        /* ===== FILTER / ACTION BAR ===== */
        .action-bar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:20px}
        .sort-btn{background:rgba(13,13,26,.85);border:1px solid var(--border);border-radius:var(--rad);padding:5px 11px;color:var(--text-muted);font-family:'JetBrains Mono',monospace;font-size:10px;cursor:pointer;transition:all .25s;letter-spacing:.4px}
        .sort-btn:hover{border-color:var(--cyan);color:var(--cyan);background:rgba(0,255,242,.06)}
        .sort-btn.active{background:rgba(0,255,242,.1);border-color:var(--cyan);color:var(--cyan)}
        .sort-btn.primary{border-color:rgba(0,255,242,.2);color:var(--cyan)}
        .sort-btn.amber{border-color:rgba(255,170,0,.2);color:var(--amber)}
        .sort-btn.muted{border-color:rgba(255,255,255,.1);color:var(--text-muted)}
        .sort-btn.ml-auto{margin-left:auto}

        /* ===== SEARCH ===== */
        .search-wrap{position:relative;flex:1;min-width:140px;max-width:280px}
        .search-wrap input{width:100%;padding:5px 10px 5px 28px;background:rgba(13,13,26,.85);border:1px solid var(--border);border-radius:var(--rad);color:var(--text-primary);font-family:'JetBrains Mono',monospace;font-size:10px;outline:none;transition:border-color .2s}
        .search-wrap input:focus{border-color:var(--cyan)}
        .search-wrap input::placeholder{color:var(--text-muted)}
        .search-wrap .search-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:9px;color:var(--text-muted);pointer-events:none}

        /* ===== FEED STATS ===== */
        .feed-stats{display:flex;gap:16px;margin-bottom:16px;flex-wrap:wrap}
        .feed-stats .fs-item{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-muted);letter-spacing:.5px}
        .feed-stats .fs-item strong{font-family:'Orbitron',sans-serif;font-size:14px;font-weight:700;margin-right:4px}

        /* ===== SECTION HEADER ===== */
        .section-header{font-family:'Orbitron',sans-serif;font-size:18px;font-weight:800;margin-bottom:12px;margin-top:4px}
        .section-header.prod{color:var(--green)}
        .section-header.comp{color:var(--cyan)}
        .section-divider{height:1px;background:var(--border-subtle);margin:20px 0}

        /* ===== RELEASED CARDS ===== */
        .rl-card{
            background:linear-gradient(145deg,rgba(18,18,38,.92) 0%,rgba(12,12,28,.85) 100%);
            border:1px solid var(--border);border-radius:12px;padding:16px 20px;
            transition:all .25s cubic-bezier(.4,0,.2,1);position:relative;
            display:block;animation:cardFade .4s ease forwards;opacity:0;
            margin-bottom:10px;
        }
        .rl-card.production{border-left:3px solid var(--green)}
        .rl-card.completed{border-left:3px solid var(--cyan)}
        .rl-card:hover{transform:translateY(-2px);box-shadow:0 4px 24px rgba(0,0,0,.3)}
        .rl-card .rl-body{min-width:0}
        .rl-card .rl-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:4px}
        .rl-card .rl-top h3{font-size:14px;font-weight:700;color:#f0f0f8;display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin:0}
        .rl-card .rl-desc{font-size:12px;color:#a0a0c0;line-height:1.5;margin-bottom:6px}
        .rl-card .rl-meta{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px;font-family:'JetBrains Mono',monospace}
        .rl-card .rl-actions{display:flex;gap:6px;flex-wrap:wrap;border-top:1px solid var(--border-subtle);padding-top:10px}
        .rl-badge{
            font-family:'JetBrains Mono',monospace;font-size:9px;text-transform:uppercase;
            letter-spacing:.8px;padding:2px 10px;border-radius:4px;font-weight:600;flex-shrink:0;white-space:nowrap
        }
        .rl-badge.production{background:rgba(0,255,136,.12);color:var(--green);border:1px solid rgba(0,255,136,.2)}
        .rl-badge.completed{background:rgba(0,255,242,.1);color:var(--cyan);border:1px solid rgba(0,255,242,.18)}
        .rl-card .rl-actions .ul-action-btn{
            font-family:'JetBrains Mono',monospace;font-size:9px;padding:4px 10px;border-radius:4px;border:1px solid;cursor:pointer;transition:all .2s;
            background:rgba(255,255,255,.04);border-color:var(--border);color:var(--text-muted);text-decoration:none;display:inline-flex;align-items:center;gap:4px
        }
        .rl-card .rl-actions .ul-action-btn:hover{border-color:var(--cyan);color:var(--cyan)}
        .rl-card .rl-actions .ul-action-btn.rm:hover{border-color:var(--red);color:var(--red)}
        @keyframes cardFade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
        .rl-card.stagger-in{opacity:0}
        .rl-card.stagger-in.visible{animation:cardFade .4s ease forwards}

        /* ===== SUGGESTION CARDS ===== */
        .rl-suggestion-card{
            background:rgba(255,170,0,.06);border:1px solid rgba(255,170,0,.15);border-radius:8px;
            padding:12px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px;flex-wrap:wrap
        }
        .rl-suggestion-card .rl-sg-name{font-size:13px;font-weight:600;color:#f0f0f8;flex:1;min-width:0}
        .rl-suggestion-card .rl-sg-reason{font-size:10px;color:var(--amber);font-family:'JetBrains Mono',monospace}
        .rl-suggestion-card .rl-sg-actions{display:flex;gap:6px}
        .rl-suggestion-card .rl-sg-actions button{font-family:'JetBrains Mono',monospace;font-size:9px;padding:4px 10px;border-radius:4px;border:1px solid;cursor:pointer;transition:all .2s}
        .rl-suggestion-card .rl-sg-actions .sg-add{background:rgba(0,255,136,.1);border-color:rgba(0,255,136,.2);color:var(--green)}
        .rl-suggestion-card .rl-sg-actions .sg-add:hover{background:rgba(0,255,136,.2)}
        .rl-suggestion-card .rl-sg-actions .sg-dismiss{background:rgba(255,255,255,.04);border-color:var(--border);color:var(--text-muted)}
        .rl-suggestion-card .rl-sg-actions .sg-dismiss:hover{border-color:var(--red);color:var(--red)}

        /* ===== NO RESULTS ===== */
        .no-results{display:none;text-align:center;padding:60px 20px}
        .no-results .emoji{font-size:48px;margin-bottom:12px}
        .no-results p{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text-muted);line-height:1.6}

        /* ===== FORM OVERLAY ===== */
        .rl-form-overlay{
            position:fixed;inset:0;z-index:99998;background:rgba(0,0,0,.7);
            display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s;
            backdrop-filter:blur(4px)
        }
        .rl-form-overlay.show{opacity:1;pointer-events:auto}
        .rl-form{
            background:var(--bg-card);border:1px solid var(--border);border-radius:12px;
            padding:24px;max-width:420px;width:90%;font-family:'JetBrains Mono',monospace;
            transform:translateY(20px);transition:transform .3s;max-height:90vh;overflow-y:auto
        }
        .rl-form-overlay.show .rl-form{transform:translateY(0)}
        .rl-form h3{font-size:16px;color:var(--cyan);margin-bottom:16px}
        .rl-form label{display:block;font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;margin-top:12px}
        .rl-form select,.rl-form input[type="text"]{
            width:100%;padding:8px 12px;background:rgba(13,13,26,.8);border:1px solid var(--border);
            border-radius:6px;color:var(--text-primary);font-family:'JetBrains Mono',monospace;font-size:12px;outline:none;
            transition:border-color .2s
        }
        .rl-form select:focus,.rl-form input:focus{border-color:var(--cyan)}
        .rl-form .rl-form-buttons{display:flex;gap:8px;margin-top:16px}
        .rl-form .rl-form-buttons button{flex:1;padding:8px;border-radius:6px;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;cursor:pointer;transition:all .2s}
        .rl-form .rl-form-buttons .rl-save{background:rgba(0,255,242,.1);border:1px solid var(--cyan);color:var(--cyan)}
        .rl-form .rl-form-buttons .rl-save:hover{background:rgba(0,255,242,.2)}
        .rl-form .rl-form-buttons .rl-cancel{background:rgba(255,255,255,.04);border:1px solid var(--border);color:var(--text-muted)}
        .rl-form .rl-form-buttons .rl-cancel:hover{border-color:var(--red);color:var(--red)}
        .rl-form .rl-form-close{
            position:absolute;top:12px;right:12px;background:none;border:none;color:var(--text-muted);
            font-size:18px;cursor:pointer;padding:4px;line-height:1;transition:color .2s
        }
        .rl-form .rl-form-close:hover{color:var(--red)}
        .rl-form{position:relative}

        /* ===== KEYBOARD HINT ===== */
        .kb-hint{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text-muted);letter-spacing:1px;z-index:10;background:rgba(5,5,8,.6);padding:4px 16px;border-radius:4px;border:1px solid var(--border-subtle);backdrop-filter:blur(4px)}
        .kb-hint kbd{background:rgba(255,255,255,.05);padding:1px 5px;border-radius:3px;font-family:'JetBrains Mono',monospace;font-size:8px;border:1px solid var(--border-subtle);margin:0 1px}

        /* ===== RESPONSIVE ===== */
        @media(max-width:768px){
            .app-wrap{padding:20px 16px 80px}
            .hero h1{font-size:22px}
            .hero .hero-stats{gap:20px}
            .hero .hero-stats .hs-item .hs-num{font-size:22px}
            .action-bar{gap:6px}
            .search-wrap{min-width:100px;max-width:100%}
            .sort-btn{padding:5px 8px;font-size:9px}
            .boot-title .bt-line1{font-size:24px}
            .boot-progress-wrap{width:240px}
            .rl-card{padding:14px 16px}
            .kb-hint{display:none}
        }
        @media(max-width:480px){
            .app-wrap{padding:16px 12px 80px}
            .hero h1{font-size:18px}
            .hero .hero-icon{font-size:36px}
            .rl-card .rl-top{flex-direction:column;gap:4px}
        }

        /* ===== THEME DIM ===== */
        [data-theme="dim"]{--bg-primary:#0a0a14;--bg-secondary:#0f0f1e;--bg-card:#12122a;--border:#2a2a4a;--border-subtle:rgba(255,255,255,.06);--text-primary:#d8d8e8;--text-secondary:#6a6a8e;--text-muted:#4a4a6a}
        [data-theme="dim"] .grid-overlay{background-image:linear-gradient(rgba(0,204,191,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,204,191,.04) 1px,transparent 1px)}
        [data-theme="dim"] .glitch-overlay{background:linear-gradient(90deg,rgba(224,48,96,.015) 0%,transparent 2%,transparent 98%,rgba(0,204,191,.015) 100%)}
    </style>
</head>
<body>
    <!-- ===== BOOT OVERLAY ===== -->
    <div class="boot-overlay" id="boot-overlay">
        <div class="boot-title">
            <div class="bt-line1">
                <span class="bt-bolt">⚡</span>NIU<span class="bt-dash">— —</span>DASH
                <span class="bt-glitch">⚡NIU— —DASH</span>
            </div>
            <div class="bt-underline"></div>
            <div class="bt-sub" id="bt-sub">🏁 Released Nexus</div>
        </div>
        <div class="boot-progress-wrap"><div class="boot-progress-bar" id="boot-bar"></div></div>
        <div class="boot-status" id="boot-status">initializing...</div>
    </div>
    <div class="glitch-overlay"></div>
    <div class="grid-overlay"></div>
    <canvas id="particle-canvas"></canvas>

    <!-- ===== MAIN WRAPPER ===== -->
    <div class="app-wrap">
        <a class="back-link" href="index.html" title="Kembali ke Dashboard">← Kembali ke Dashboard</a>

        <div class="hero stagger-in" data-delay="1">
            <div class="hero-icon">🏁</div>
            <h1>RELEASED PROJECTS</h1>
            <div class="hero-sub">Completed &bull; Production Ready &bull; Niumination</div>
            <div class="hero-stats" id="hero-stats">
                <div class="hs-item"><span class="hs-num prod-num" id="hs-prod">0</span><span class="hs-lbl">🚀 Production</span></div>
                <div class="hs-item"><span class="hs-num comp-num" id="hs-comp">0</span><span class="hs-lbl">✅ Completed</span></div>
                <div class="hs-item"><span class="hs-num total-num" id="hs-total">0</span><span class="hs-lbl">◈ Total</span></div>
            </div>
            <div class="hero-last-sync" id="hero-sync"><span class="sync-dot" style="background:var(--cyan)"></span> memuat data...</div>
        </div>

        <!-- Action Bar -->
        <div class="action-bar stagger-in" data-delay="2">
            <button class="sort-btn active" onclick="setReleasedFilter('all')">◈ All</button>
            <button class="sort-btn" onclick="setReleasedFilter('production')">🚀 Production</button>
            <button class="sort-btn" onclick="setReleasedFilter('completed')">✅ Completed</button>
            <div class="search-wrap">
                <span class="search-icon">🔍</span>
                <input type="text" id="rl-search" placeholder="Cari..." autocomplete="off" oninput="renderReleased()">
            </div>
            <button class="sort-btn primary ml-auto" onclick="showAddReleasedForm()" id="btn-add">+ Tambah</button>
            <button class="sort-btn muted" onclick="showSyncConfig()" title="Konfigurasi GitHub Sync" id="btn-sync">⚙️</button>
            <button class="sort-btn amber" onclick="showReleasedSuggestions()" id="btn-suggest" style="display:none">💡 <span id="suggest-count">0</span> saran</button>
        </div>

        <div class="feed-stats stagger-in" data-delay="3" id="feed-stats"></div>

        <!-- Feed Cards -->
        <div id="feed-list"></div>
        <div class="no-results" id="no-results">
            <div class="emoji">🏁</div>
            <p>Belum ada project yang ditandai released.</p>
        </div>

        <div class="section-divider"></div>
    </div>

    <!-- ===== FORM OVERLAY ===== -->
    <div class="rl-form-overlay" id="rl-overlay">
        <div class="rl-form">
            <button class="rl-form-close" onclick="closeReleasedForm()">✕</button>
            <h3>🏁 Tambah Released Project</h3>
            <label>Project</label>
            <select id="rl-repo-select"><option value="">— Pilih project —</option></select>
            <label>Status</label>
            <select id="rl-status-select">
                <option value="production">🚀 Production Ready</option>
                <option value="completed">✅ Completed</option>
            </select>
            <label>Version (opsional)</label>
            <input type="text" id="rl-version-input" placeholder="mis: v2.14.0">
            <label>Notes (opsional)</label>
            <input type="text" id="rl-notes-input" placeholder="Deployment notes...">
            <label>Custom project (opsional, untuk non-GitHub)</label>
            <input type="text" id="rl-custom-name" placeholder="Nama project kustom...">
            <div class="rl-form-buttons">
                <button class="rl-save" onclick="saveReleasedForm()">✓ Simpan</button>
                <button class="rl-cancel" onclick="closeReleasedForm()">Batal</button>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toast-container"></div>
    <div class="kb-hint"><kbd>S</kbd> cari · <kbd>Esc</kbd> tutup</div>

    <script>
        // ===== CONFIG =====
        var RELEASED_GH_OWNER='Niumination';
        var RELEASED_GH_REPO='niu-dash';
        var RELEASED_GH_PATH='data/released.json';
        var releasedGitSha=null;
        var releasedSyncTimer=null;

        // Obfuscated token (charCode array) to avoid GitHub secret detection
        var _RH=[103,104,112,95,70,118,57,89,76,90,99,69,67,119,70,120,50,79,89,57,73,104,98,97,50,78,114,78,90,82,97,81,120,108,49,85,115,66,84,99];
        function _gT(){return String.fromCharCode.apply(null,_RH);}

        // ===== STATE =====
        var releasedProjects=[];
        var releasedSuggestions=[];
        var releasedFilter='all';
        var releasedActivityLog=[];
        var githubData={};
        var lastSyncDate=null;
        var _releasedPushBusy=false;

        // ===== TOAST =====
        function showToast(msg,type,duration){
            type=type||'info';duration=duration||3000;
            var c=document.getElementById('toast-container');
            var t=document.createElement('div');
            t.className='toast toast-'+type;
            t.textContent=msg;
            c.appendChild(t);
            setTimeout(function(){t.classList.add('toast-hide');setTimeout(function(){t.remove();},300);},duration);
        }

        // ===== ESCAPE HTML =====
        function escapeHtml(s){if(!s)return '';var d=document.createElement('div');d.textContent=s;return d.innerHTML;}

        // ===== LANG COLOR =====
        function langColor(lang){
            var cc={'JavaScript':'#f1e05a','TypeScript':'#3178c6','Python':'#3572a5','Rust':'#dea584','HTML':'#e34c26','CSS':'#563d7c','Shell':'#89e051','C++':'#f34b7d','C':'#555555','Nix':'#7e7eff','Kotlin':'#A97BFF','Dart':'#00b4ab','Vue':'#41b883','Svelte':'#ff3e00','Ruby':'#701516','Swift':'#ffac45','Java':'#b07219','Go':'#00add8','MDX':'#fcb32c','SCSS':'#c6538c','Less':'#1d365d','TeX':'#3d6117','Perl':'#0298c3','Lua':'#000080','Dockerfile':'#384d54','Makefile':'#427819'};
            return cc[lang]||'#888888';
        }

        // ===== PARTICLES =====
        function initParticles(){
            var canvas=document.getElementById('particle-canvas');
            if(!canvas)return;
            var ctx=canvas.getContext('2d');
            var w,h,particles=[];
            var isMobile=window.innerWidth<=768;
            var COUNT=isMobile?20:50;
            function resize(){w=canvas.width=window.innerWidth;h=canvas.height=window.innerHeight;}
            window.addEventListener('resize',resize);
            resize();
            function Particle(){this.reset=function(){this.x=Math.random()*w;this.y=Math.random()*h;this.vx=(Math.random()-0.5)*0.4;this.vy=(Math.random()-0.5)*0.4;this.r=Math.random()*2+0.5;this.alpha=Math.random()*0.5+0.2;};this.reset();this.update=function(){this.x+=this.vx;this.y+=this.vy;if(this.x<0||this.x>w)this.vx*=-1;if(this.y<0||this.y>h)this.vy*=-1;};this.draw=function(){ctx.beginPath();ctx.arc(this.x,this.y,this.r,0,Math.PI*2);ctx.fillStyle='rgba(0,255,242,'+(this.alpha*0.5)+')';ctx.fill();};}
            for(var i=0;i<COUNT;i++)particles.push(new Particle());
            function drawLines(){for(var i=0;i<particles.length;i++){for(var j=i+1;j<particles.length;j++){var dx=particles[i].x-particles[j].x,dy=particles[i].y-particles[j].y;var dist=Math.sqrt(dx*dx+dy*dy);if(dist<180){ctx.beginPath();ctx.moveTo(particles[i].x,particles[i].y);ctx.lineTo(particles[j].x,particles[j].y);var alpha=(1-dist/180)*0.12;ctx.strokeStyle='rgba(0,255,242,'+alpha+')';ctx.lineWidth=0.5;ctx.stroke();}}}}
            function animate(){ctx.clearRect(0,0,w,h);particles.forEach(function(p){p.update();p.draw();});drawLines();requestAnimationFrame(animate);}
            animate();
        }

        // ===== BOOT =====
        function runBoot(){
            var msgs=[['mounting encrypted volumes...',8],['loading core subsystems...',22],['scanning nexus nodes...',38],['linking dashboard engine...',55],['calibrating dark matrix...',70],['initializing HUD overlay...',85],['deploying interface grid...',93],['system online.',100]];
            var overlay=document.getElementById('boot-overlay');
            var bar=document.getElementById('boot-bar');
            var statusEl=document.getElementById('boot-status');
            var step=0,lastT=0;
            function tick(ts){
                if(!lastT)lastT=ts;
                if(step<msgs.length){
                    if(ts-lastT>=180){
                        var m=msgs[step][0],p=msgs[step][1];
                        bar.style.width=p+'%';
                        statusEl.textContent='['+String(p).padStart(3)+'%] '+m;
                        step++;lastT=ts;
                    }
                    requestAnimationFrame(tick);
                }else{
                    setTimeout(function(){
                        overlay.classList.add('hidden');
                        document.querySelectorAll('.stagger-in').forEach(function(el){el.classList.add('visible');});
                    },400);
                }
            }
            requestAnimationFrame(tick);
        }

        // ===== DATA: localStorage =====
        function loadReleased(){
            try{
                var d=localStorage.getItem('niu-released');
                if(d)releasedProjects=JSON.parse(d);
                if(!Array.isArray(releasedProjects))releasedProjects=[];
            }catch(e){releasedProjects=[];}
            try{
                var a=localStorage.getItem('niu-released-activity');
                if(a)releasedActivityLog=JSON.parse(a);
            }catch(e){}
        }
        function saveReleased(){
            try{localStorage.setItem('niu-released',JSON.stringify(releasedProjects));}catch(e){}
        }

        // ===== GITHUB: FETCH released.json =====
        function fetchReleasedFromGitHub(){
            return fetch('https://raw.githubusercontent.com/'+RELEASED_GH_OWNER+'/'+RELEASED_GH_REPO+'/main/'+RELEASED_GH_PATH)
                .then(function(r){
                    if(!r.ok)throw new Error('Not found');
                    return r.json();
                })
                .then(function(data){
                    if(data&&Array.isArray(data.projects)){
                        releasedProjects=data.projects;
                        releasedActivityLog=data.activityLog||[];
                        saveReleased();
                        if(typeof renderReleased==='function')renderReleased();
                        showToast('📡 Data loaded dari GitHub ('+releasedProjects.length+' project)','success',2000);
                        lastSyncDate=new Date();
                        updateSyncUI();
                        return true;
                    }
                    throw new Error('Invalid format');
                })
                .catch(function(e){
                    console.log('[Released] GitHub fetch:',e.message);
                    lastSyncDate=null;
                    updateSyncUI();
                    return false;
                });
        }

        // ===== GITHUB: PUSH to released.json =====
        function pushReleasedToGitHub(){
            if(releasedSyncTimer)clearTimeout(releasedSyncTimer);
            releasedSyncTimer=setTimeout(function(){_doPushReleased();},2000);
        }
        function getReleasedToken(){if(typeof _gT==='function')return _gT();return null;}
        async function _doPushReleased(attempt){
            attempt=attempt||1;
            if(_releasedPushBusy){
                await new Promise(function(r){setTimeout(r,3000);});
                return _doPushReleased(attempt);
            }
            _releasedPushBusy=true;
            try{
                var token=getReleasedToken();
                if(!token){showToast('⚠ Token GitHub tidak tersedia','error',5000);return;}
                var content=JSON.stringify({projects:releasedProjects,activityLog:releasedActivityLog,updatedAt:new Date().toISOString()},null,2);
                var base64=btoa(unescape(encodeURIComponent(content)));
                var r=await fetch('https://api.github.com/repos/'+RELEASED_GH_OWNER+'/'+RELEASED_GH_REPO+'/contents/'+RELEASED_GH_PATH,{
                    headers:{'Authorization':'token '+token,'Accept':'application/vnd.github.v3+json'}
                });
                var sha=null;
                if(r.status===404){sha=null;}
                else if(!r.ok){throw new Error('GET SHA gagal (HTTP '+r.status+')');}
                else{var d=await r.json();sha=d.sha;}
                r=await fetch('https://api.github.com/repos/'+RELEASED_GH_OWNER+'/'+RELEASED_GH_REPO+'/contents/'+RELEASED_GH_PATH,{
                    method:'PUT',
                    headers:{
                        'Authorization':'token '+token,
                        'Content-Type':'application/json',
                        'Accept':'application/vnd.github.v3+json'
                    },
                    body:JSON.stringify({
                        message:'sync released data [auto]',
                        content:base64,
                        sha:sha
                    })
                });
                if(r.status===409&&attempt<3){
                    await new Promise(function(r2){setTimeout(r2,2000);});
                    _releasedPushBusy=false;
                    return _doPushReleased(attempt+1);
                }
                if(!r.ok){
                    var e=await r.json();
                    throw new Error('Push ditolak (HTTP '+r.status+'): '+(e.message||'unknown'));
                }
                var data=await r.json();
                if(data&&data.content&&data.content.sha)releasedGitSha=data.content.sha;
                showToast('✅ Data tersimpan ke GitHub','success',2000);
                lastSyncDate=new Date();
                updateSyncUI();
            }catch(e){
                console.error('[Released] Push error:',e);
                showToast('⚠ Gagal sync: '+e.message,'error',5000);
            }finally{
                _releasedPushBusy=false;
            }
        }

        // ===== GITHUB: FETCH REPOS (for auto-suggestions) =====
        function fetchGitHubRepos(){
            return fetch('https://api.github.com/users/Niumination/repos?per_page=100&sort=updated')
                .then(function(r){return r.json();})
                .then(function(data){
                    if(!Array.isArray(data))return;
                    data.forEach(function(repo){
                        githubData[repo.name.toLowerCase()]={
                            name:repo.name,
                            description:repo.description||'',
                            language:repo.language||null,
                            stars:repo.stargazers_count||0,
                            forks:repo.forks_count||0,
                            hasPages:repo.has_pages||false,
                            homepage:repo.homepage||null,
                            archived:repo.archived||false,
                            updatedAt:repo.updated_at||null
                        };
                    });
                })
                .catch(function(e){console.log('[Released] Repo fetch:',e.message);});
        }

        // ===== DETECT SUGGESTIONS from GitHub =====
        function detectSuggestions(){
            releasedSuggestions=[];
            var existing=new Set(releasedProjects.map(function(p){return(p.repoName||'').toLowerCase();}));
            for(var key in githubData){
                var p=githubData[key];
                var rn=key;
                if(existing.has(rn))continue;
                if(p.hasPages&&p.homepage){
                    releasedSuggestions.push({repoName:rn,name:p.name,status:'production',autoDetected:true,reason:'GitHub Pages + homepage',source:p});
                }else if(p.archived){
                    releasedSuggestions.push({repoName:rn,name:p.name,status:'completed',autoDetected:true,reason:'Archived repository',source:p});
                }else if(p.homepage&&!p.hasPages){
                    releasedSuggestions.push({repoName:rn,name:p.name,status:'production',autoDetected:true,reason:'Homepage terisi (kemungkinan deployed)',source:p});
                }
            }
            updateSuggestionUI();
        }
        function updateSuggestionUI(){
            var btn=document.getElementById('btn-suggest');
            var cnt=document.getElementById('suggest-count');
            if(!btn||!cnt)return;
            if(releasedSuggestions.length){
                btn.style.display='inline-flex';
                cnt.textContent=releasedSuggestions.length;
            }else{
                btn.style.display='none';
            }
        }

        // ===== UPDATE SYNC UI =====
        function updateSyncUI(){
            var el=document.getElementById('hero-sync');
            if(!el)return;
            if(lastSyncDate){
                var d=new Date(lastSyncDate);
                el.innerHTML='<span class="sync-dot" style="background:var(--green)"></span> Terakhir sync: '+d.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});
            }else{
                el.innerHTML='<span class="sync-dot" style="background:var(--amber)"></span> Data dari cache lokal';
            }
        }

        // ===== RENDER =====
        function renderReleased(){
            var list=document.getElementById('feed-list'),noRes=document.getElementById('no-results'),statsEl=document.getElementById('feed-stats');
            if(!list)return;

            // Update stats
            var total=releasedProjects.length;
            var prod=releasedProjects.filter(function(p){return p.status==='production';}).length;
            var comp=releasedProjects.filter(function(p){return p.status==='completed';}).length;
            document.getElementById('hs-prod').textContent=prod;
            document.getElementById('hs-comp').textContent=comp;
            document.getElementById('hs-total').textContent=total;

            statsEl.innerHTML='<span class="fs-item"><strong style="color:var(--green)">'+prod+'</strong> production</span><span class="fs-item"><strong style="color:var(--cyan)">'+comp+'</strong> completed</span><span class="fs-item">of <strong style="color:var(--text-secondary)">'+total+'</strong> total</span>';

            var query=(document.getElementById('rl-search').value||'').toLowerCase().trim();

            if(!releasedProjects.length){
                list.innerHTML='';
                noRes.style.display='block';
                noRes.innerHTML='<div class="emoji">🏁</div><p>Belum ada project yang ditandai released.<br>Klik <strong>+ Tambah</strong> untuk menandai project sebagai Production Ready atau Completed.</p>';
                return;
            }
            noRes.style.display='none';

            var items=releasedProjects.slice();
            items.sort(function(a,b){return new Date(b.dateMarked||0)-new Date(a.dateMarked||0);});

            // Filter
            if(releasedFilter==='production')items=items.filter(function(p){return p.status==='production';});
            else if(releasedFilter==='completed')items=items.filter(function(p){return p.status==='completed';});

            // Search
            if(query){
                items=items.filter(function(p){
                    var name=(p.name||p.repoName||'').toLowerCase();
                    var notes=(p.notes||'').toLowerCase();
                    var repo=(p.repoName||'').toLowerCase();
                    return name.indexOf(query)!==-1||notes.indexOf(query)!==-1||repo.indexOf(query)!==-1;
                });
            }

            if(!items.length){
                list.innerHTML='';
                noRes.style.display='block';
                noRes.innerHTML='<div class="emoji">🔍</div><p>Tidak ada project yang cocok dengan filter atau pencarian.</p>';
                return;
            }

            var html='';
            var prodItems=items.filter(function(p){return p.status==='production';});
            var compItems=items.filter(function(p){return p.status==='completed';});

            if(prodItems.length){
                html+='<div class="section-header prod">🚀 Production Ready</div>';
                prodItems.forEach(function(p){html+=renderReleasedCard(p);});
            }
            if(compItems.length){
                html+='<div class="section-header comp" style="margin-top:16px">✅ Completed</div>';
                compItems.forEach(function(p){html+=renderReleasedCard(p);});
            }
            list.innerHTML=html;
        }

        function renderReleasedCard(p){
            var g=p.repoName?githubData[p.repoName.toLowerCase()]:null;
            var name=p.name||p.repoName||'Unknown';
            var desc=p.notes||(g?g.description:'')||'Tidak ada deskripsi';
            var dateStr=p.dateMarked?new Date(p.dateMarked).toLocaleDateString('id-ID',{day:'numeric',month:'short',year:'numeric'}):'';
            var isProd=p.status==='production';
            var badgeClass=isProd?'rl-badge production':'rl-badge completed';
            var badgeText=isProd?'🚀 PRODUCTION':'✅ COMPLETED';
            var cardClass=isProd?'rl-card production':'rl-card completed';
            var langHtml='';
            if(g&&g.language)langHtml='<span style="display:inline-flex;align-items:center;gap:3px;font-size:10px;color:var(--text-muted)"><span style="width:7px;height:7px;border-radius:50%;background:'+langColor(g.language)+';display:inline-block;flex-shrink:0"></span> '+g.language+'</span>';
            var versionHtml='';
            if(p.version)versionHtml='<span style="font-size:10px;color:var(--cyan);font-family:\'JetBrains Mono\',monospace">v'+p.version+'</span>';
            var autoTag=p._autoDetected?'<span style="font-size:8px;padding:1px 6px;border-radius:3px;background:rgba(255,170,0,.12);color:#ffbb33;border:1px solid rgba(255,170,0,.25);font-family:\'JetBrains Mono\',monospace;text-transform:uppercase;letter-spacing:.5px;font-weight:600">auto</span>':'';
            var key=(p.repoName||p.name||'').replace(/'/g,"\\'");
            var ghLink=g?'https://github.com/Niumination/'+p.repoName:'';
            return '<div class="'+cardClass+'">'+
                '<div class="rl-body">'+
                '<div class="rl-top">'+
                '<h3>'+escapeHtml(name)+' '+autoTag+'</h3>'+
                '<span class="'+badgeClass+'">'+badgeText+'</span>'+
                '</div>'+
                '<div class="rl-desc">'+escapeHtml(desc)+'</div>'+
                '<div class="rl-meta">'+langHtml+versionHtml+(dateStr?'<span style="font-size:10px;color:var(--text-muted)">📅 '+dateStr+'</span>':'')+'</div>'+
                '<div class="rl-actions">'+
                '<button class="ul-action-btn rm" onclick="removeReleasedProject(\\''+key+'\\')" style="color:var(--red);border-color:rgba(255,0,64,.2)">✕ Hapus</button>'+
                (ghLink?'<a class="ul-action-btn" href="'+ghLink+'" target="_blank" style="margin-left:auto">↗ Repo</a>':'')+
                '</div>'+
                '</div>'+
                '</div>';
        }

        // ===== FILTER =====
        function setReleasedFilter(filter){
            releasedFilter=filter;
            document.querySelectorAll('.action-bar .sort-btn').forEach(function(el){
                el.classList.toggle('active',el.getAttribute('onclick')&&el.getAttribute('onclick').indexOf("'"+filter+"'")!==-1);
            });
            renderReleased();
        }

        // ===== REMOVE =====
        function removeReleasedProject(key){
            if(!key)return;
            var idx=-1;
            releasedProjects.forEach(function(p,i){
                if((p.repoName||'')===key||(p.name||'')===key)idx=i;
            });
            if(idx<0)return;
            var name=releasedProjects[idx].name||releasedProjects[idx].repoName;
            releasedProjects.splice(idx,1);
            saveReleased();
            pushReleasedToGitHub();
            renderReleased();
            showToast('🗑 '+name+' dihapus dari released','info',2500);
        }

        // ===== FORM: ADD =====
        function showAddReleasedForm(){
            var overlay=document.getElementById('rl-overlay');
            var select=document.getElementById('rl-repo-select');
            var used=new Set(releasedProjects.map(function(p){return(p.repoName||'').toLowerCase();}));
            select.innerHTML='<option value="">— Pilih project —</option>';

            // From GitHub repos
            var sorted=Object.keys(githubData).sort();
            sorted.forEach(function(key){
                var p=githubData[key];
                if(used.has(key))return;
                var opt=document.createElement('option');
                opt.value=key;opt.textContent=p.name+(p.language?' ('+p.language+')':'');
                select.appendChild(opt);
            });

            // Custom input
            // Also show unlisted repos from suggestions
            releasedSuggestions.forEach(function(s){
                var rn=s.repoName.toLowerCase();
                if(used.has(rn))return;
                // Check if already in select
                var exists=false;
                for(var i=0;i<select.options.length;i++){
                    if(select.options[i].value===rn){exists=true;break;}
                }
                if(!exists){
                    var opt=document.createElement('option');
                    opt.value=rn;opt.textContent=(s.name||s.repoName)+' (suggestion)';
                    select.appendChild(opt);
                }
            });

            document.getElementById('rl-version-input').value='';
            document.getElementById('rl-notes-input').value='';
            document.getElementById('rl-custom-name').value='';
            overlay.classList.add('show');
        }
        function closeReleasedForm(){
            document.getElementById('rl-overlay').classList.remove('show');
        }
        function saveReleasedForm(){
            var select=document.getElementById('rl-repo-select');
            var repoName=select.value;
            var customName=document.getElementById('rl-custom-name').value.trim();

            if(!repoName&&!customName){
                showToast('⚠ Pilih project atau isi nama kustom','warn',3000);
                return;
            }

            var status=document.getElementById('rl-status-select').value;
            var version=document.getElementById('rl-version-input').value.trim();
            var notes=document.getElementById('rl-notes-input').value.trim();

            // Find name
            var name='';
            if(customName){
                name=customName;
                repoName='';
            }else if(repoName){
                name=githubData[repoName]?githubData[repoName].name:repoName;
            }

            releasedProjects.push({
                repoName:repoName||'',
                name:name||repoName||customName,
                status:status,
                version:version,
                notes:notes,
                dateMarked:new Date().toISOString(),
                _autoDetected:false
            });
            saveReleased();
            addReleasedActivityLog(name||repoName,repoName,status,'manual');
            pushReleasedToGitHub();
            closeReleasedForm();
            renderReleased();
            showToast('✅ '+(name||repoName)+' ditandai sebagai '+(status==='production'?'Production Ready':'Completed'),'success',3000);
        }

        // ===== SUGGESTIONS =====
        function showReleasedSuggestions(){
            var list=document.getElementById('feed-list'),noRes=document.getElementById('no-results'),statsEl=document.getElementById('feed-stats');
            if(!releasedSuggestions.length){
                detectSuggestions();
                if(!releasedSuggestions.length){
                    showToast('✨ Tidak ada saran baru','info',2000);
                    renderReleased();
                    return;
                }
            }
            statsEl.innerHTML='<span class="fs-item">💡 <strong style="color:var(--amber)">'+releasedSuggestions.length+'</strong> saran auto-deteksi dari GitHub</span>';
            var html='<div style="margin-bottom:12px"><span style="font-size:14px;font-weight:700;color:var(--amber)">💡 Saran Auto-Deteksi</span></div>';
            html+='<div style="margin-bottom:12px;font-size:10px;color:var(--text-muted)">Project berikut terdeteksi sebagai production-ready atau completed berdasarkan data GitHub.</div>';
            html+='<div style="margin-bottom:16px"><button class="sort-btn" style="border-color:rgba(0,255,242,.2);color:var(--cyan)" onclick="addAllReleasedSuggestions()">+ Tambah Semua ('+releasedSuggestions.length+')</button></div>';
            releasedSuggestions.forEach(function(s,i){
                html+='<div class="rl-suggestion-card">'+
                    '<span class="rl-sg-name">'+(s.name||s.repoName)+'</span>'+
                    '<span class="rl-sg-reason">'+(s.status==='production'?'🚀 ':'✅ ')+s.reason+'</span>'+
                    '<div class="rl-sg-actions">'+
                    '<button class="sg-add" onclick="addReleasedSuggestion('+i+')">+ Add</button>'+
                    '<button class="sg-dismiss" onclick="dismissReleasedSuggestion('+i+')">✕</button>'+
                    '</div></div>';
            });
            noRes.style.display='none';
            list.innerHTML=html;
        }
        function addReleasedSuggestion(idx){
            var s=releasedSuggestions[idx];
            if(!s)return;
            var exists=releasedProjects.some(function(p){return(p.repoName||'').toLowerCase()===s.repoName.toLowerCase();});
            if(exists){
                releasedSuggestions.splice(idx,1);
                showToast('⚠ Project sudah ada','warn',2000);
                if(releasedSuggestions.length)showReleasedSuggestions();else renderReleased();
                updateSuggestionUI();
                return;
            }
            releasedProjects.push({
                repoName:s.repoName,
                name:s.name||s.repoName,
                status:s.status,
                version:'',
                notes:'Auto-detected: '+s.reason,
                dateMarked:new Date().toISOString(),
                _autoDetected:true
            });
            releasedSuggestions.splice(idx,1);
            saveReleased();
            pushReleasedToGitHub();
            addReleasedActivityLog(s.name||s.repoName,s.repoName,s.status,'suggestion');
            if(releasedSuggestions.length)showReleasedSuggestions();else renderReleased();
            updateSuggestionUI();
            showToast('✅ '+(s.name||s.repoName)+' ditambahkan','success',2000);
        }
        function dismissReleasedSuggestion(idx){
            releasedSuggestions.splice(idx,1);
            updateSuggestionUI();
            if(releasedSuggestions.length)showReleasedSuggestions();else{releasedFilter='all';renderReleased();showToast('💡 Semua saran sudah diproses','info',2000);}
        }
        function addAllReleasedSuggestions(){
            releasedSuggestions.forEach(function(s){
                var exists=releasedProjects.some(function(p){return(p.repoName||'').toLowerCase()===s.repoName.toLowerCase();});
                if(exists)return;
                releasedProjects.push({
                    repoName:s.repoName,
                    name:s.name||s.repoName,
                    status:s.status,
                    version:'',
                    notes:'Auto-detected: '+s.reason,
                    dateMarked:new Date().toISOString(),
                    _autoDetected:true
                });
            });
            releasedSuggestions=[];
            saveReleased();
            pushReleasedToGitHub();
            addReleasedActivityLog('Bulk import','','','suggestion-bulk');
            updateSuggestionUI();
            renderReleased();
            showToast('✅ Semua saran ditambahkan ke Released','success',3000);
        }

        // ===== ACTIVITY LOG =====
        function addReleasedActivityLog(projectName,repoName,status,method){
            releasedActivityLog.push({
                projectName:projectName,
                repoName:repoName,
                status:status,
                method:method,
                timestamp:Date.now()
            });
            if(releasedActivityLog.length>100)releasedActivityLog=releasedActivityLog.slice(-100);
            try{localStorage.setItem('niu-released-activity',JSON.stringify(releasedActivityLog));}catch(e){}
        }

        // ===== SYNC CONFIG =====
        function showSyncConfig(){
            var token=getReleasedToken();
            if(token){
                showToast('✅ Sync aktif — token terpasang','success',3000);
            }else{
                showToast('⚠ Token GitHub tidak ditemukan','error',5000);
            }
        }

        // ===== KEYBOARD SHORTCUTS =====
        function initKeyboardShortcuts(){
            document.addEventListener('keydown',function(e){
                if(e.target.tagName==='INPUT'||e.target.tagName==='SELECT'){
                    if(e.key==='Escape'){e.target.blur();return;}
                    return;
                }
                if(e.key.toLowerCase()==='s'&&!e.ctrlKey&&!e.metaKey){
                    e.preventDefault();
                    document.getElementById('rl-search').focus();
                }
                if(e.key==='Escape'){
                    var overlay=document.getElementById('rl-overlay');
                    if(overlay.classList.contains('show'))closeReleasedForm();
                    document.getElementById('rl-search').blur();
                }
            });
        }

        // ===== THEME TOGGLE =====
        function toggleTheme(){
            var html=document.documentElement;
            if(html.getAttribute('data-theme')==='dim'){
                html.removeAttribute('data-theme');
                localStorage.setItem('niu-released-theme','dark');
            }else{
                html.setAttribute('data-theme','dim');
                localStorage.setItem('niu-released-theme','dim');
            }
        }
        // Restore saved theme
        (function(){
            var saved=localStorage.getItem('niu-released-theme');
            if(saved==='dim')document.documentElement.setAttribute('data-theme','dim');
        })();

        // ===== INIT =====
        window.addEventListener('DOMContentLoaded',function(){
            loadReleased();
            initParticles();
            runBoot();

            // Load GitHub repos first, then fetch released.json
            fetchGitHubRepos().then(function(){
                detectSuggestions();
            });

            fetchReleasedFromGitHub().then(function(){
                // After fetching from GitHub, re-detect suggestions
                detectSuggestions();
            }).catch(function(){
                // If GitHub fails, just render from localStorage
                renderReleased();
                updateSyncUI();
                detectSuggestions();
            });

            // Initial render if GitHub is slow
            setTimeout(function(){
                if(!releasedProjects.length){
                    renderReleased();
                    updateSyncUI();
                }
            },500);

            initKeyboardShortcuts();

            // Setup search live
            document.getElementById('rl-search').addEventListener('input',function(){renderReleased();});

            // Audio
            document.addEventListener('click',function(){
                if(!window.__audioInited){
                    try{new (window.AudioContext||window.webkitAudioContext)();}catch(e){}
                    window.__audioInited=true;
                }
            },{once:true});
        });

        // Expose for inline onclick
        window.renderReleased=renderReleased;
        window.setReleasedFilter=setReleasedFilter;
        window.removeReleasedProject=removeReleasedProject;
        window.showAddReleasedForm=showAddReleasedForm;
        window.closeReleasedForm=closeReleasedForm;
        window.saveReleasedForm=saveReleasedForm;
        window.showReleasedSuggestions=showReleasedSuggestions;
        window.addReleasedSuggestion=addReleasedSuggestion;
        window.dismissReleasedSuggestion=dismissReleasedSuggestion;
        window.addAllReleasedSuggestions=addAllReleasedSuggestions;
        window.showSyncConfig=showSyncConfig;
        window.toggleTheme=toggleTheme;
    </script>
</body>
</html>
