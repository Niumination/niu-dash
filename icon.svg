<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a14"/>
      <stop offset="100%" style="stop-color:#0d0d26"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00fff2"/>
      <stop offset="100%" style="stop-color:#00ccff"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <rect width="512" height="512" rx="96" fill="none" stroke="#00fff2" stroke-width="6" opacity=".3"/>
  <!-- Grid lines -->
  <line x1="0" y1="128" x2="512" y2="128" stroke="#00fff2" stroke-width=".5" opacity=".08"/>
  <line x1="0" y1="256" x2="512" y2="256" stroke="#00fff2" stroke-width=".5" opacity=".08"/>
  <line x1="0" y1="384" x2="512" y2="384" stroke="#00fff2" stroke-width=".5" opacity=".08"/>
  <line x1="128" y1="0" x2="128" y2="512" stroke="#00fff2" stroke-width=".5" opacity=".08"/>
  <line x1="256" y1="0" x2="256" y2="512" stroke="#00fff2" stroke-width=".5" opacity=".08"/>
  <line x1="384" y1="0" x2="384" y2="512" stroke="#00fff2" stroke-width=".5" opacity=".08"/>
  <!-- Lightning bolt ⚡ -->
  <g transform="translate(256,240)">
    <polygon points="-8,-120 40,-40 -16,-32 8,40 -48,-32 16,-48" fill="url(#bolt)"/>
    <polygon points="-8,-120 40,-40 -16,-32 8,40 -48,-32 16,-48" fill="url(#bolt)" opacity=".4" transform="scale(1.15)"/>
  </g>
  <!-- Glow -->
  <circle cx="256" cy="240" r="60" fill="#00fff2" opacity=".08"/>
  <circle cx="256" cy="240" r="40" fill="#00fff2" opacity=".06"/>
  <!-- Text: NDASH -->
  <text x="256" y="370" text-anchor="middle" font-family="'Courier New',monospace" font-size="64" font-weight="700" fill="#00fff2" letter-spacing="6">NDASH</text>
  <text x="256" y="370" text-anchor="middle" font-family="'Courier New',monospace" font-size="64" font-weight="700" fill="#00fff2" letter-spacing="6" opacity=".15" transform="translate(2,1)">NDASH</text>
</svg>
